<app-search-bar-zone (selectedZone)="onZoneSelected($event)" ></app-search-bar-zone>

<div class="commissions">
  <table mat-table [dataSource]="dataCommissions" class="mat-elevation-z8">
  
    <!-- Comisión de porcentaje de cobranza -->
    <ng-container matColumnDef="collectionRate">
      <th mat-header-cell *matHeaderCellDef> Porcentaje de cobranza </th>
      <td mat-cell *matCellDef="let element"> {{element.collectionRate}} </td>
    </ng-container>
  
    <!-- Gastos de cobranza -->
    <ng-container matColumnDef="collectionExpenses"> 
      <th mat-header-cell *matHeaderCellDef> Gastos de cobranza </th>
      <td mat-cell *matCellDef="let element"> {{element.collectionExpenses}} </td>
    </ng-container>

    <!-- Número de créditos -->
    <ng-container matColumnDef="numberCredits">
      <th mat-header-cell *matHeaderCellDef> No. de créditos </th>
      <td mat-cell *matCellDef="let element"> {{element.numberCredits}} </td>
    </ng-container>

    <!-- EXTRAS -->
    <ng-container matColumnDef="extras">
      <th mat-header-cell *matHeaderCellDef> Extras </th>
      <td mat-cell *matCellDef="let element"> {{element.extras}} </td>
    </ng-container>
  
    <!-- cantidad total -->
    <ng-container matColumnDef="totalAmount">
      <th mat-header-cell *matHeaderCellDef>Total </th>
      <td mat-cell *matCellDef="let element"> {{element.totalAmount}} </td>
    </ng-container>
  
    <tr mat-header-row *matHeaderRowDef="commissionsCol"></tr>
    <tr mat-row *matRowDef="let row; columns: commissionsCol;"></tr>
  </table>
</div>

<form class="extra-form" [formGroup]="extraCommissionForm" (ngSubmit)="addExtraCommission()">
  <div class="form-card">
    <h3>Agregar extra</h3>
    <div class="form-row">
      <div class="input-group">
        <label>Monto extra</label>
        <input type="number" formControlName="extra" placeholder="Ingresa el monto" required>
      </div>
      <div class="input-group">
        <label>Descripción</label>
        <input type="text" formControlName="description" placeholder="Describe el extra" required>
      </div>
    </div>

  </div>
  <div class="button-container">
    <app-save-button label="Agregar a extras"></app-save-button>
  </div>

</form>
